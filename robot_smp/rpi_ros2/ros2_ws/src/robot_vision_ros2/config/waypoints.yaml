# 巡检点配置
# 根据你的实际地图坐标修改
# name: 巡检点名称（会出现在日志和报告中）
# x, y: 地图坐标 (米)
# yaw: 朝向 (弧度, 0=正东, 1.57=正北, 3.14=正西)

waypoints:
  - name: "巡检点A"
    x: 1.0
    y: 0.0
    yaw: 0.0

  - name: "巡检点B"
    x: 2.0
    y: 1.0
    yaw: 1.57

  - name: "巡检点C"
    x: 1.0
    y: 2.0
    yaw: 3.14

  - name: "巡检点D"
    x: 0.0
    y: 1.0
    yaw: -1.57
